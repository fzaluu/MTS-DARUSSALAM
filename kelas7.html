<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rombel</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    margin: 0;
    padding: 0;
}

.container {
    width: 100%;
    min-height: 100vh;
    background: url('bg.jpg') center/cover no-repeat;
    background-attachment: fixed;
    position: relative;
    color: white;
}

.container::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

.content {
    position: relative;
    z-index: 2;
    padding: 40px 20px;
    max-width: 1440px;
    margin: 0 auto;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.title {
    text-align: center;
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 30px;
    animation: fadeInDown 0.8s ease-out;
}

.btn {
    width: 137px;
    height: 52px;
    background: #64AC7B;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 25px;
    cursor: pointer;
    border: none;
    color: white;
    text-decoration: none;
    animation: fadeInUp 0.8s ease-out 0.2s both;
    transition: all 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

.btn:active {
    transform: scale(0.98);
}

.top {
    display: flex;
    flex-direction: row;
    gap: 20px;
    margin-bottom: 20px;
    align-items: flex-start;
    width: 100%;
}

.column {
    display: flex;
    flex-direction: column;
    gap: 18px;
    flex: 1;
    min-width: 0;
}

.box {
    width: 100%;
    min-height: 49px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 4px 4px 0 #000;
    color: black;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: scaleIn 0.6s ease-out 0.3s both;
    transition: all 0.3s ease;
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 6px 6px 0 #000;
}

.label {
    font-size: 15px;
    font-weight: 600;
}

.value {
    font-size: 15px;
    font-weight: 300;
}

.single {
    font-size: 20px;
    font-weight: 600;
}

.section {
    width: 100%;
    height: 41px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 4px 4px 0 #000;
    margin: 35px auto 20px;
    display: flex;
    align-items: center;
    padding-left: 15px;
    color: black;
    font-size: 20px;
    font-weight: 300;
    animation: fadeInUp 0.6s ease-out 0.5s both;
    transition: all 0.3s ease;
}

.section:hover {
    box-shadow: 6px 6px 0 #000;
}

.students {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
    gap: 16px;
    justify-items: center;
}

.card {
    width: 100%;
    max-width: 100%;
    min-height: 68px;
    height: auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 4px 4px 0 #000;
    padding: 10px 15px;
    color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0;
    animation: scaleIn 0.5s ease-out forwards;
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 6px 6px 0 #000;
}

.name {
    font-size: 18px;
    font-weight: 600;
}

.nis {
    font-size: 14px;
    font-weight: 300;
}

@media (max-width: 1024px) {
    .content { padding: 30px 15px; }
    .title { font-size: 36px; }
    .students { grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr)); gap: 14px; }
    .top { gap: 15px; }
}

@media (max-width: 768px) {
    .content { padding: 25px 15px; }
    .title { font-size: 28px; }
    .btn { width: 120px; height: 45px; font-size: 16px; }
    .top { gap: 12px; }
    .students { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .name { font-size: 15px; }
    .nis { font-size: 12px; }
    .section { font-size: 15px; height: 38px; margin: 25px auto 15px; }
    .label, .value { font-size: 12px; }
}

@media (max-width: 480px) {
    .content { padding: 15px 10px; }
    .title { font-size: 18px; }
    .btn { width: 100px; height: 40px; font-size: 14px; }
    .top { gap: 8px; }
    .students { grid-template-columns: 1fr; gap: 10px; }
    .name { font-size: 13px; }
    .nis { font-size: 11px; }
    .section { font-size: 13px; height: 35px; padding-left: 12px; margin: 20px auto 15px; }
    .box { padding: 8px 10px; border-radius: 12px; }
    .label, .value { font-size: 11px; }
}
</style>
</head>

<body>

</html>
